plugins {
id 'java'
id 'application'
}
group = 'com.example'
version = '1.0'
repositories {
mavenCentral()
}
dependencies {
implementation 'com.google.guava:guava:30.1-jre'
testImplementation 'junit:junit:4.13.2'
}
mainClassName = 'com.example.AdditionOperation'
test {
testLogging {
events "passed", "failed", "skipped"
showStandardStreams = true
}
}




